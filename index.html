<!DOCTYPE html>
<html>
<head>
<title>My Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#222;
border-radius:10px;
padding:10px;
}
iframe{
width:100%;
height:400px;
border:none;
}
</style>
</head>

<body>

<h1>My Arcade</h1>

<div class="grid">

<div class="card">
<h2>Cookie Clicker</h2>
<iframe src="https://orteil.dashnet.org/cookieclicker/"></iframe>
</div>

<div class="card">
<h2>A Dark Room</h2>
<iframe src="https://adarkroom.doublespeakgames.com"></iframe>
</div>

<div class="card">
<h2>Tetr.io</h2>
<iframe src="https://tetr.io"></iframe>
</div>

</div>

</body>
</html>
