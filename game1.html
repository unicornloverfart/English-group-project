<!DOCTYPE html>
<html>
<head>

<title>Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
}

#frame{
width:100%;
height:100vh;
border:none;
}

button{
position:absolute;
top:10px;
right:10px;
padding:10px 15px;
font-size:16px;
z-index:10;
}

</style>

</head>

<body>

<button onclick="fullscreen()">Fullscreen</button>

<iframe id="frame" src="PUT-GAME-LINK-HERE"></iframe>

<script>

function fullscreen(){
let frame=document.getElementById("frame");

if(frame.requestFullscreen){
frame.requestFullscreen();
}

}

</script>

</body>
</html>
